<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐哦宝贝🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Noto Sans SC', sans-serif;
    background: url("bg6.jpg") no-repeat center center;
    background-size: cover;
    background-attachment: fixed;
    color: white;
    overflow-x: hidden;
}

/* 遮罩 */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 1;
}

/* 烟花 */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
    pointer-events: none;
}

/* 页面 */
.section {
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2;
    padding: 40px 20px;
    text-align: center;
}

h1 {
    font-size: 30px;
    font-family: 'KaiTi', serif;
    display: flex;
    justify-content: center; /* 水平居中 */
    align-items: center;     /* 垂直居中 */
    flex-direction: column;
    text-align: center;
}

p {
    font-size: 24px;
    font-family: 'ZCOOL KuaiLe', cursive;
    line-height: 1.6;
    display: flex;
    justify-content: center; /* 水平居中 */
    align-items: center;     /* 垂直居中 */
    flex-direction: column;
    text-align: center;
}

/* 左右 */
.split {
    display: flex;
    gap: 60px;
    max-width: 1000px;
    margin: auto;
    align-items: center;
}

.text-box {
    flex: 1;
    max-width: 520px;
    text-align: center;
    line-height: 1.8;
}

#typing {
    font-size: 22px;
    max-width: 800px;
}

/* 照片 */
.photo-box {
    flex: 1;
    position: relative;
    height: 300px;
    perspective: 1000px;
}

.flip-card {
    position: absolute;
    width: 220px;
    height: 280px;
    opacity: 0;
    transform: rotateY(-180deg);
    transition: 1s;
}

.flip-card.active {
    opacity: 1;
    transform: rotateY(0deg);
}

.flip-card img {
    width: 100%;
    height: 100%;
    border-radius: 15px;
    object-fit: cover;
}

/* 🎂 蛋糕 */
.cake {
    margin-top: 20px;
    cursor: pointer;
    animation: float 2s infinite;
}

.layer {
    width: 120px;
    height: 30px;
    border-radius: 10px;
    margin: 5px auto;
    box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
}

.top { background: linear-gradient(135deg, #a0c4ff, #4dabf7);}
.middle { background: linear-gradient(135deg, #4dabf7, #339af0);}
.bottom { background: linear-gradient(135deg, #339af0, #1c7ed6); }

.candle {
    width: 10px;
    height: 30px;
    background: white;
    margin: auto;
    position: relative;
}

.flame {
    width: 10px;
    height: 15px;
    background: #f8991d;
    border-radius: 50%;
    position: absolute;
    top: -15px;
    animation: flicker 0.3s infinite alternate;
}

.flame.off { display: none; }

.smoke {
    width: 10px;
    height: 10px;
    background: gray;
    border-radius: 50%;
    position: absolute;
    top: -15px;
    opacity: 0;
}

.smoke.show {
    animation: smoke 1.5s forwards;
}

@keyframes smoke {
    0% { transform: translateY(0); opacity: 0.8; }
    100% { transform: translateY(-40px); opacity: 0; }
}

@keyframes flicker {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="Feels Like You.mp3">
</audio>

<canvas id="canvas"></canvas>

<!-- 第一屏 -->
<div class="section">
    <div>
        <h1>生日快乐呀我的宝贝🎂❤️❤️❤️</h1>
        <p>记得开声音哦然后许愿捏🎂✨</p>
        <p>点一下蛋糕可以许愿就成功啦✨</p>
        <!-- 🎂 蛋糕 -->
        <div class="cake" onclick="blowCandle()">
            <div class="candle">
                <div class="flame" id="flame"></div>
                <div class="smoke" id="smoke"></div>
            </div>
            <div class="layer top"></div>
            <div class="layer middle"></div>
            <div class="layer bottom"></div>
        </div>

        <p>👇 继续往下滑哦</p>
    </div>
</div>

<!-- 第二屏 -->
<div class="section fade">
    <div class="split">

        <div class="text-box">
            <div id="typing"></div>
        </div>

        <div class="photo-box">
            <div class="flip-card active"><img src="photo 1.jpeg"></div>
            <div class="flip-card"><img src="photo 2.jpeg"></div>
            <div class="flip-card"><img src="photo 3.jpeg"></div>
            <div class="flip-card"><img src="photo 4.jpeg"></div>
            <div class="flip-card"><img src="photo 5.jpeg"></div>
            <div class="flip-card"><img src="photo 6.jpeg"></div>
        </div>

    </div>
</div>

<script>
/* 音乐 */
document.body.addEventListener("click", () => {
    document.getElementById("music").play();
}, { once: true });

/* 🎂 吹蜡烛 */
let blown = false;
function blowCandle() {
    const flame = document.getElementById("flame");
    const smoke = document.getElementById("smoke");

    if (!blown) {
        flame.classList.add("off");
        smoke.classList.add("show");
        blown = true;
    } else {
        flame.classList.remove("off");
        smoke.classList.remove("show");
        blown = false;
    }
}

/* 打字机 */
const text = "谢谢你出现在我的世界里❤️\n陪我疯陪我闹✨\n未来的每一天\n我都想陪着你走下去💖\n生日快乐呀宝贝💕\n爱你呀我的大笨蛋Σ>―(〃°ω°〃)♡→";
let i = 0;
function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 280);
    }
}
typing();

/* 翻页 */
let cards = document.querySelectorAll(".flip-card");
let index = 0;
setInterval(() => {
    cards[index].classList.remove("active");
    index = (index + 1) % cards.length;
    cards[index].classList.add("active");
}, 2500);

/* 烟花（修复颜色） */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class Particle {
    constructor(x,y){
        this.x=x; this.y=y;
        this.dx=(Math.random()-0.5)*6;
        this.dy=(Math.random()-0.5)*6;
        this.alpha=1;
    }
    update(){ this.x+=this.dx; this.y+=this.dy; this.alpha-=0.02; }
    draw(){
        ctx.fillStyle = "rgba(255,215,0," + this.alpha + ")";
        ctx.fillRect(this.x,this.y,2,2);
    }
}

let fireworks=[];
class Firework{
    constructor(){
        this.x=Math.random()*canvas.width;
        this.y=canvas.height;
        this.target=Math.random()*canvas.height/2;
        this.exploded=false;
        this.particles=[];
    }
    update(){
        if(!this.exploded){
            this.y-=5;
            if(this.y<=this.target){
                this.exploded=true;
                for(let i=0;i<60;i++){
                    this.particles.push(new Particle(this.x,this.y));
                }
            }
        } else {
            this.particles.forEach(p=>p.update());
        }
    }
    draw() {
        if (!this.exploded) {
            ctx.fillStyle = "#ffd700";
            ctx.fillStyle = "rgba(255,105,180," + this.alpha + ")";
            ctx.fillRect(this.x, this.y, 2, 5);
        } else {
            this.particles.forEach(p => p.draw());
        }
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(Math.random()<0.05) fireworks.push(new Firework());
    fireworks.forEach(f=>{f.update();f.draw();});
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
